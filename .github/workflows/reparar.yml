name: Reparar Motor y Compilar
on: [push, workflow_dispatch]
jobs:
  repair_and_build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
    - name: Generar Gradlew Oficial
      run: |
        npm install -g corepack
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
    - name: Subir cambios al repositorio
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add gradlew gradle/
        git commit -m "Auto-generar motor de compilación" || echo "No hay cambios"
        git push origin HEAD
    - name: Compilar APK Ultra Liviano
      run: ./gradlew assembleDebug
    - name: Guardar APK Terminado
      uses: actions/upload-artifact@v4
      with:
        name: MudarMusica-Snaptube
        path: app/build/outputs/apk/debug/app-debug.apk
